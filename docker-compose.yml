services:
  postgres:
    image: postgres:16.1-alpine
    container_name: orbit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: orbit_pswd
      POSTGRES_DB: orbit_engine
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orbit_engine"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - engine_network

  redis:
    image: redis:7-alpine
    container_name: orbit_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - engine_network

  core-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbit_api
    restart: unless-stopped
    command: sh -c "pnpm prisma migrate deploy && node dist/apps/core-api/main.js"
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:orbit_pswd@postgres:5432/orbit_engine?schema=public
      - REDIS_HOST=redis
      - PORT=5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - engine_network

  core-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbit_worker
    restart: unless-stopped
    command: node dist/apps/core-worker/main.js
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:orbit_pswd@postgres:5432/orbit_engine?schema=public
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - engine_network

volumes:
  postgres_data:
  redis_data:

networks:
  engine_network:
    driver: bridge
